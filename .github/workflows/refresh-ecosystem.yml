name: refresh-ecosystem

# Keeps the Tier 2 official-marketplace snapshot (catalog/ecosystem.json) fresh by re-running the
# ingest against Anthropic's official plugin marketplace on a schedule. Commits only when it changes.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ingest official marketplace
        run: npm run ingest
      - name: Validate catalog
        run: node scripts/validate-catalog.mjs
      - name: Commit if ecosystem.json changed
        run: |
          if [ -n "$(git status --porcelain plugins/loadout/catalog/ecosystem.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugins/loadout/catalog/ecosystem.json
            git commit -m "chore: refresh official marketplace snapshot (ecosystem.json)"
            git push
          else
            echo "ecosystem.json already current — nothing to commit."
          fi
