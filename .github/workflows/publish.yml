name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Verify before publish
        run: npm test
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping npm publish."
            echo "::warning::Add an npm granular token at Settings → Secrets → Actions → NPM_TOKEN"
            echo "::warning::Or publish locally: npm publish (your ~/.npmrc token still works)."
            exit 0
          fi
          VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view claude-loadout version 2>/dev/null || true)
          if [ "$VER" = "$PUBLISHED" ]; then
            echo "::notice::claude-loadout@$VER is already on npm — skipping publish"
            exit 0
          fi
          npm publish --provenance --access public
