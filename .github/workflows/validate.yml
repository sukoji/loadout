name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate catalog integrity
        run: node scripts/validate-catalog.mjs
      - name: Recommend regression tests
        run: node scripts/test-recommend.mjs
      - name: Verify MCP packages on npm
        run: node scripts/verify-mcp-packages.mjs
      - name: Check docs are in sync
        run: |
          node scripts/build-docs.mjs
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "::error::docs/domains/ is out of date. Run 'npm run build:docs' and commit the result."
            git --no-pager diff -- docs/
            exit 1
          fi
